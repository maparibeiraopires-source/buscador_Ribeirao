<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Análise de Ruas</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Montserrat',sans-serif;background:#f4f6f8;padding:20px}
h1{margin-bottom:20px}

.toolbar{display:flex;gap:10px;margin-bottom:20px}
input{padding:10px;border-radius:8px;border:1px solid #ccc;width:300px}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08)
}

.card h3{margin:0 0 8px;font-size:18px}

.meta{font-size:13px;color:#555}

.calc{margin-top:8px;font-weight:600}

.tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:12px;
  font-size:11px;
  font-weight:700;
  margin-right:6px;
}

.sem-saida{background:#ffe5e5;color:#a30000}
.fechada{background:#e5e9ff;color:#1f2ea3}
.parcial{background:#fff3cd;color:#856404}
.projeto{background:#e0f7fa;color:#006064}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  border-radius:8px;
  background:#1f2937;
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:600
}

.totais{
  margin-top:30px;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.08)
}
</style>
</head>

<body>

<h1>Sistema de Análise de Ruas</h1>

// 🔢 número seguro
function toNumber(v){
  if(!v) return 0;
  return Number(String(v).replace(',', '.')) || 0;
}

// 🔍 normalizar texto
function normalizar(txt){
  return String(txt || '')
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

// 📍 link mapa
function coordsParaLink(c){
  if(!c) return null;
  return `https://www.google.com/maps?q=${encodeURIComponent(c)}`;
}

// 🔥 trata escadaria (objeto ou número)
function getEscadaria(valor){
  if(!valor) return 0;

  if(typeof valor === "object"){
    let total = 0;
    for(let k in valor){
      total += toNumber(valor[k]);
    }
    return total;
  }

  return toNumber(valor);
}

const search = document.getElementById('search');

search.addEventListener('input', render);

function render(){

  const termo = normalizar(search.value);
  const cards = document.getElementById('cards');
  cards.innerHTML='';

  let totalCidade={terra:0,bloq:0,para:0,asf:0,esc:0};

  let contSemSaida=0;

  dados
  .filter(d=>{
    return Object.values(d).some(v =>
      normalizar(v).includes(termo)
    );
  })
  .forEach(d=>{

    const nomeCompleto=[
      d['TIPO'],
      d['COMPLEMENTO DO NOME'],
      d['NOME']
    ].filter(Boolean).join(' ');

    const terra = toNumber(d['TERRA']);
    const bloq = toNumber(d['BLOQUETE']);
    const para = toNumber(d['PARALELEPÍPEDO']);
    const asf  = toNumber(d['ASFALTO']);
    const esc  = getEscadaria(d['METRAGEM ESCADARIA']);

    const totalRua = terra + bloq + para + asf + esc;

    totalCidade.terra+=terra;
    totalCidade.bloq+=bloq;
    totalCidade.para+=para;
    totalCidade.asf+=asf;
    totalCidade.esc+=esc;

    const semSaida = normalizar(d['SEM SAÍDA'])==='sem saida';
    if(semSaida) contSemSaida++;

    const linkMapa=coordsParaLink(d['COORDENADAS']);

    const card=document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <h3>${nomeCompleto}</h3>

      ${semSaida?'<span class="tag sem-saida">SEM SAÍDA</span>':''}

      <div class="meta">Vila: ${d['VILA']||'-'} | Bairro: ${d['BAIRRO']||'-'}</div>
      <div class="meta">CEP: ${d['CEP']||'-'}</div>

      <div class="calc">
        Terra: ${terra} m<br>
        Bloquete: ${bloq} m<br>
        Paralelepípedo: ${para} m<br>
        Asfalto: ${asf} m<br>
        Escadaria: ${esc} m<br><br>

        <strong>Total:</strong> ${totalRua} m
      </div>

      ${linkMapa?`<a class="btn" href="${linkMapa}" target="_blank">Ver no mapa</a>`:''}
    `;

    cards.appendChild(card);
  });

  document.getElementById('totais').innerHTML=`
    <h2>Totais Gerais</h2>

    Terra: ${totalCidade.terra} m<br>
    Bloquete: ${totalCidade.bloq} m<br>
    Paralelepípedo: ${totalCidade.para} m<br>
    Asfalto: ${totalCidade.asf} m<br>
    Escadarias: ${totalCidade.esc} m<br><br>

    Sem saída: ${contSemSaida}
  `;
}

// primeira renderização
render();

</script>
